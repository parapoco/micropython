name: Build Pico2 Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up ARM GCC
      uses: arm-software/cc-action@v1
      with:
        cpu: arm-none-eabi

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential python3

    - name: Build MicroPython Cross-Compiler
      run: |
        make -C mpy-cross

    - name: Build Pico 2 W Firmware
      run: |
        cd ports/rp2
        make BOARD=RPI_PICO2
