name: Build Pico2 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc-arm-none-eabi build-essential python3 libnewlib-arm-none-eabi

    - name: Build mpy-cross
      run: |
        make -C mpy-cross
        
    - name: Generate mdxdata.inc
      run: |
        cd ports/rp2/mdx
        python3 ./makemdxdata.py mdxlist.txt mdxdata.inc  
    
    - name: Build Pico 2 Firmware
      run: |
        cd ports/rp2
        make BOARD=RPI_PICO2 USER_C_MODULES=$(pwd)/mdx

    # ⭕ 重複していたステップを1つに統合し、確実に動くパスに修正しました
    - name: Upload Firmware Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pico2-firmware
        path: ports/rp2/build-RPI_PICO2/firmware.uf2
