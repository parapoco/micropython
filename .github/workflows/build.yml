name: Build Pico2 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install Dependencies
      run: |
        sudo apt-get update
        # ⭕ python3 を小文字に修正。ビルドに必要な libnewlib も追加
        sudo apt-get install -y cmake gcc-arm-none-eabi build-essential python3 libnewlib-arm-none-eabi

    - name: Build mpy-cross
      run: |
        make -C mpy-cross
        
    - name: Generate mdxdata.inc
      run: |
        cd ports/rp2/mdx
        # 🌟 失敗したときだけ、ファイルの中身（エラー）を画面に表示して終了する設定
        python3 makemdxdata.py mdxlist.txt > mdxdata.inc || (echo "=== ERROR REPORT ===" && cat mdxdata.inc && exit 1)
   
    
    # ⭕ 以前正常動作していた、あなたのリポジトリの make コマンドに戻しました
    - name: Build Pico 2 Firmware
      run: |
        cd ports/rp2
        make BOARD=RPI_PICO2 USER_C_MODULES=$(pwd)/mdx

    - name: Upload Firmware Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pico2-firmware
        path: ports/rp2/build*/**/firmware.uf2

    - name: Upload Firmware Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pico2-firmware
        # 🌟 path を以下のように書き換えてみてください
        path: ports/rp2/build-RPI_PICO2/firmware.uf2
